<main class="calculator-layout">

 <section class="calculator">
    <header class="calculator__header">
      <app-calculator-display />
    </header>

    <div class="calculator__accent"></div>

    <aside class="calculator__memory">
      <app-memory-panel />
    </aside>

    <section class="calculator__keyboard">
      <app-calculator-keyboard (buttonPressed)="onButtonPressed($event)"> </app-calculator-keyboard>
    </section>

  </section>
</main>
