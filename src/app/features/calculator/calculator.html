<main class="min-h-screen flex items-center justify-center p-4">

  <section
    class="calculator w-full max-w-sm md:max-w-md lg:max-w-lg xl:max-w-xl">

    <header class="calculator__header">
      <app-calculator-display />
    </header>

    <aside class="calculator__memory">
      <app-memory-panel />
    </aside>

    <section class="calculator__keyboard">
      <app-calculator-keyboard
        (buttonPressed)="onButtonPressed($event)">
      </app-calculator-keyboard>
    </section>

  </section>

</main>
